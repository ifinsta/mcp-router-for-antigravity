<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ifin Platform Browser</title>
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="popup">
  <header class="popup-header">
    <div class="brand-lockup">
      <img class="brand-logo brand-logo--dark" src="assets/ifin-logo-dark.svg" alt="ifin">
      <img class="brand-logo brand-logo--light" src="assets/ifin-logo-light.svg" alt="ifin">
      <div class="brand-copy">
        <span class="brand-name">ifin</span>
        <span class="brand-suite">Platform Browser</span>
      </div>
    </div>
    <div class="popup-header__status">
      <span class="status-dot" id="popupStatusDot" title="Disconnected"></span>
      <span class="status-label" id="popupStatusLabel">Disconnected</span>
      <span id="mode-badge" class="mode-badge" style="display: none;">
        <span id="mode-badge-text">Agent</span>
      </span>
      <button class="btn btn--ghost btn--icon" id="themeToggleBtn" data-theme-toggle type="button">Auto</button>
    </div>
  </header>

  <!-- Status Summary -->
  <div id="status-summary" class="status-summary">
    <div class="status-item">
      <span class="status-item-dot" id="mcp-status-dot"></span>
      <span class="status-item-label">MCP</span>
    </div>
    <div class="status-item">
      <span class="status-item-dot" id="bridge-status-dot"></span>
      <span class="status-item-label">Bridge</span>
    </div>
  </div>

  <!-- Mode Selection (shown on first run) -->
  <div id="mode-selection" class="section mode-selection" style="display: none;">
    <h3 class="section-title">Choose Your Mode</h3>
    <div class="mode-cards-compact">
      <button class="mode-card-compact" data-mode="agent">
        <span class="mode-card-icon">🤖</span>
        <span class="mode-card-label">Agent Mode</span>
        <span class="mode-card-desc">Use your IDE's AI</span>
      </button>
      <button class="mode-card-compact" data-mode="router">
        <span class="mode-card-icon">🔀</span>
        <span class="mode-card-label">Router Mode</span>
        <span class="mode-card-desc">Use ifin-managed models</span>
      </button>
    </div>
  </div>

  <section class="popup-section">
    <div class="popup-section__title">Server Connection</div>
    <div class="connect-row">
      <input type="text" class="input" id="hostInput" placeholder="localhost" value="localhost" aria-label="Host">
      <span class="connect-divider">:</span>
      <input type="text" class="input input--sm" id="portInput" placeholder="3700" value="3700" aria-label="Port">
      <button class="btn btn--primary" id="connectBtn" type="button">Connect</button>
    </div>
  </section>

  <section class="quick-actions" aria-label="Quick actions">
    <button class="action-btn" id="actionScreenshot" title="Capture screenshot" type="button">
      <span class="action-btn__icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M6.5 5.5L8 4h4l1.5 1.5H16a1 1 0 011 1V14a1 1 0 01-1 1H4a1 1 0 01-1-1V6.5a1 1 0 011-1h2.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="10" cy="10" r="3" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </span>
      <span>Screenshot</span>
    </button>
    <button class="action-btn" id="actionAudit" title="Run performance audit" type="button">
      <span class="action-btn__icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M6 4h8M6 8h8M6 12h5M4.5 3.5h11a1 1 0 011 1v11a1 1 0 01-1 1h-11a1 1 0 01-1-1v-11a1 1 0 011-1Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <span>Run Audit</span>
    </button>
    <button class="action-btn" id="actionVitals" title="Refresh web vitals" type="button">
      <span class="action-btn__icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M4 14.5L7 10.5L10 12.5L14.5 6.5L16 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 4v11.5h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </span>
      <span>Web Vitals</span>
    </button>
    <button class="action-btn" id="actionMonitor" title="Toggle performance monitor" type="button">
      <span class="action-btn__icon" aria-hidden="true">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M2.5 10s2.5-4.5 7.5-4.5S17.5 10 17.5 10s-2.5 4.5-7.5 4.5S2.5 10 2.5 10Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          <circle cx="10" cy="10" r="2" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </span>
      <span>Toggle Monitor</span>
    </button>
  </section>

  <section class="popup-section">
    <div class="popup-section__title">Web Vitals</div>
    <div class="mini-vitals" id="miniVitals">
      <div class="mini-vital-row">
        <span class="mini-vital-row__label">LCP</span>
        <div class="mini-vital-bar"><div class="mini-vital-bar__fill" id="miniLcpBar"></div></div>
        <span class="mini-vital-row__value" id="miniLcpVal">--</span>
      </div>
      <div class="mini-vital-row">
        <span class="mini-vital-row__label">FID</span>
        <div class="mini-vital-bar"><div class="mini-vital-bar__fill" id="miniFidBar"></div></div>
        <span class="mini-vital-row__value" id="miniFidVal">--</span>
      </div>
      <div class="mini-vital-row">
        <span class="mini-vital-row__label">CLS</span>
        <div class="mini-vital-bar"><div class="mini-vital-bar__fill" id="miniClsBar"></div></div>
        <span class="mini-vital-row__value" id="miniClsVal">--</span>
      </div>
    </div>
  </section>

  <div class="popup-footer">
    <div class="session-info">
      <span>Active sessions: <strong id="sessionCount">0</strong></span>
      <span class="awaiting" id="awaitingLabel">Awaiting data&hellip;</span>
    </div>
    <button class="btn btn--primary btn--full" id="openDashboardBtn" type="button">Open Dashboard</button>
  </div>
</div>

<script src="theme.js"></script>
<script src="popup.js"></script>
</body>
</html>
